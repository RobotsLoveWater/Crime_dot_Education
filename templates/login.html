{% extends "layout.html" %}
{% block title %} — Login{% endblock %}

{% block body %}

    <h1>Login to an Existing Account</h1>
    <p>or, <a href="/new">create</a> a new account.</p>

    {% if error %}
    <p class=error><strong>Error:</strong> {{ error }}
    {% endif %}

    <form method=post>
        <dl>
            <dt>Username:
            <dd><input type=text name=username value="{{ request.form.username }}">
            <dt>Class Code:
            <dd><input type=text name=classcode value="{{ request.form.classcode }}">
            <dt>Password:
            <dd><input type=password name=password value="{{ request.form.password }}">
        </dl>
        <p><input type=submit value=Login>
    </form>

{% endblock %}
